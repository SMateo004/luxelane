name: Luxelane CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.24.0'
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:

  # ---------------------------------------------------------------------------
  lint:
  # ---------------------------------------------------------------------------
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: dart format --output=none --set-exit-if-changed lib/ test/

  # ---------------------------------------------------------------------------
  test:
  # ---------------------------------------------------------------------------
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get

      - name: Flutter unit & widget tests
        run: flutter test --coverage --reporter=github

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

      - name: Functions tests
        working-directory: functions
        run: |
          npm ci
          npm test

  # ---------------------------------------------------------------------------
  build_web_rider:
  # ---------------------------------------------------------------------------
    name: Build Web (Rider)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build rider web
        run: |
          flutter build web --release \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }} \
            --output=build/web_rider
      - uses: actions/upload-artifact@v4
        with:
          name: web-rider
          path: build/web_rider

  # ---------------------------------------------------------------------------
  build_web_driver:
  # ---------------------------------------------------------------------------
    name: Build Web (Driver)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build driver web
        run: |
          flutter build web --release \
            -t lib/main_driver.dart \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }} \
            --output=build/web_driver
      - uses: actions/upload-artifact@v4
        with:
          name: web-driver
          path: build/web_driver

  # ---------------------------------------------------------------------------
  build_android:
  # ---------------------------------------------------------------------------
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build rider AAB
        run: |
          flutter build appbundle --release \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }} \
            --obfuscate \
            --split-debug-info=build/debug-info
      - uses: actions/upload-artifact@v4
        with:
          name: android-rider-release
          path: build/app/outputs/bundle/release/app-release.aab

  # ---------------------------------------------------------------------------
  build_android_driver:
  # ---------------------------------------------------------------------------
    name: Build Android (Driver)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build driver AAB
        run: |
          flutter build appbundle --release \
            -t lib/main_driver.dart \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }} \
            --obfuscate \
            --split-debug-info=build/debug-info-driver
      - uses: actions/upload-artifact@v4
        with:
          name: android-driver-release
          path: build/app/outputs/bundle/release/app-release.aab

  # ---------------------------------------------------------------------------
  build_ios:
  # ---------------------------------------------------------------------------
    name: Build iOS (Rider)
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get
      - name: Build iOS rider (no-codesign)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }}

  # ---------------------------------------------------------------------------
  deploy_functions:
  # ---------------------------------------------------------------------------
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [build_web_rider, build_android]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Build & deploy functions
        working-directory: functions
        run: npm ci && npm run build
      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only functions,firestore:rules
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: luxelane-prod

  # ---------------------------------------------------------------------------
  deploy_hosting:
  # ---------------------------------------------------------------------------
    name: Deploy Hosting
    runs-on: ubuntu-latest
    needs: [deploy_functions, build_web_rider, build_web_driver]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true
      - run: flutter pub get

      - name: Build rider web for hosting
        run: |
          flutter build web --release \
            --dart-define=ENV=prod \
            --dart-define=GOOGLE_MAPS_KEY=${{ secrets.GOOGLE_MAPS_API_KEY }} \
            --dart-define=FCM_VAPID_KEY=${{ secrets.FCM_VAPID_KEY }}

      - name: Copy web build to hosting/public
        run: |
          mkdir -p hosting/public
          cp -r build/web/. hosting/public/

      - uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: luxelane-prod
